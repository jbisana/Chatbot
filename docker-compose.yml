services:
  app:
    # Uses the image built and pushed by GitHub Actions
    image: ${IMAGE_FULL_PATH:-ghcr.io/jbisana/chatbot:latest}
    container_name: react-chatbot-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - /opt/chatbot/.env
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
