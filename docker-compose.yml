services:
  app:
    # Uses the image built and pushed by GitHub Actions
    image: ghcr.io/${GITHUB_REPOSITORY:-jbisana/chatbot}:${IMAGE_TAG:-latest}
    container_name: react-chatbot-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - N8N_WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
